name: agrosat_sentinel
description: Plataforma de monitoramento agrícola via dados satelitais - AgroSat Sentinel
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Localização
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  # Gerenciamento de estado e injeção de dependências
  provider: ^6.1.2
  get_it: ^8.0.2

  # HTTP (NASA POWER API)
  http: ^1.2.2

  # Utilitários de data
  intl: 0.20.2

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
